services:
  drain-sensor-simulator:
    build: .
    image: drain-sensor-simulator:local
    environment:
      DRAIN_SIM_RUNTIME_DIR: /app/.runtime
      API_HOST: 0.0.0.0
      API_PORT: "8765"
      STREAMLIT_HOST: 0.0.0.0
      STREAMLIT_PORT: "8501"
    ports:
      - "8501:8501"
      - "8765:8765"
    volumes:
      - drain-sensor-runtime:/app/.runtime
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8765/health', timeout=3)); raise SystemExit(0 if data.get('status') == 'ok' else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  drain-sensor-runtime:
